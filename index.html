<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Coordenação Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary-blue: #3b82f6;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-purple: #a855f7;
            --card-shadow: #020617;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; min-height: 95vh; position: relative; }

        /* Estilo 3D dos Cartões */
        .module-card {
            background: linear-gradient(145deg, #243147, #1a2333);
            padding: 25px 15px;
            border-radius: 24px;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: all 0.1s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 0 var(--card-shadow), 0 15px 20px rgba(0, 0, 0, 0.4);
        }

        .module-card:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 var(--card-shadow), 0 5px 10px rgba(0, 0, 0, 0.4);
        }

        .module-card i { font-size: 2.2rem; margin-bottom: 15px; display: block; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
        .module-card span { font-weight: 700; font-size: 0.9rem; text-transform: uppercase; opacity: 0.9; }

        .icon-blue { color: #60a5fa; } .icon-lightblue { color: #93c5fd; } .icon-green { color: #4ade80; } .icon-dp { color: #cbd5e1; } .icon-gold { color: var(--accent-orange); } .icon-purple { color: var(--accent-purple); }

        /* Views */
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { display: flex; align-items: center; justify-content: space-between; padding: 15px 5px; }
        .profile-section { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; background: #334155; border: 2px solid var(--primary-blue); overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .grid-modules { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin: 25px 0; }

        .item-card { background: var(--card-bg); padding: 15px; border-radius: 18px; margin-bottom: 12px; border: 1px solid #334155; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .btn-action { flex: 1; border: none; border-radius: 10px; padding: 10px; font-weight: 700; cursor: pointer; transition: all 0.1s; font-size: 0.8rem; }
        .btn-action:active { transform: scale(0.95); }

        .drive-viewer { width: 100%; height: 500px; border-radius: 15px; border: 2px solid #334155; margin-top: 15px; display: none; }

        input, textarea, select { width: 100%; background: var(--bg-dark); border: 1px solid #334155; border-radius: 10px; padding: 12px; color: white; outline: none; box-sizing: border-box; margin-bottom: 10px; }
        
        .btn-save { width: 100%; background: var(--primary-blue); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 5px 0 #1d4ed8; }
        .btn-save:active { transform: translateY(3px); box-shadow: 0 2px 0 #1d4ed8; }

        /* Modais */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: flex-end; z-index: 1000; }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 450px; padding: 25px; border-radius: 25px 25px 0 0; border-top: 1px solid rgba(255,255,255,0.1); }

        .fab-add { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: var(--primary-blue); border-radius: 50%; border: none; color: white; font-size: 24px; box-shadow: 0 6px 0 #1d4ed8; cursor: pointer; z-index: 99; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="view-dashboard" class="view active">
        <header>
            <div class="profile-section">
                <div class="avatar" onclick="document.getElementById('avatar-input').click()">
                    <i class="fas fa-user" id="placeholder-icon"></i>
                    <img src="" id="user-photo" style="display:none; width:100%; height:100%; object-fit:cover;">
                </div>
                <span style="font-weight: 600;">Coordenação Local</span>
            </div>
        </header>

        <main class="grid-modules">
            <div class="module-card" onclick="changeView('view-employees')">
                <i class="fas fa-users icon-blue"></i><span>Funcionários</span>
            </div>
            <div class="module-card" onclick="changeView('view-atas')">
                <i class="far fa-file-alt icon-lightblue"></i><span>Atas</span>
            </div>
            <div class="module-card">
                <i class="fas fa-chart-line icon-green"></i><span>Relatórios</span>
            </div>
            <div class="module-card">
                <i class="far fa-id-badge icon-dp"></i><span>D.P.</span>
            </div>
            <div class="module-card" onclick="openPatrimonio()">
                <i class="fas fa-boxes icon-gold"></i><span>Patrimônio</span>
            </div>
            <div class="module-card" onclick="document.getElementById('file-upload').click()">
                <i class="fas fa-cloud-upload-alt icon-purple"></i><span>Upload</span>
                <input type="file" id="file-upload" style="display:none" onchange="processarUpload(event)">
            </div>
        </main>
    </div>

    <div id="view-employees" class="view">
        <header>
            <button onclick="changeView('view-dashboard')" style="background:none; border:none; color:white; font-size: 1.2rem;"><i class="fas fa-arrow-left"></i></button>
            <span style="font-weight: 600;">Gestão de Equipe</span>
            <div style="width:20px"></div>
        </header>
        <input type="text" id="searchInput" placeholder="Filtrar por nome..." onkeyup="executarFiltro()" style="margin-top:10px">
        <div id="employee-list" style="margin-top:20px;"></div>
        <button class="fab-add" onclick="openModal('modalAddEmployee')"><i class="fas fa-plus"></i></button>
    </div>

    <div id="view-atas" class="view">
        <header>
            <button onclick="changeView('view-dashboard')" style="background:none; border:none; color:white; font-size: 1.2rem;"><i class="fas fa-arrow-left"></i></button>
            <span style="font-weight: 600;">Arquivo de Atas</span>
            <div style="width:20px"></div>
        </header>
        <input type="text" id="ataFilter" placeholder="Filtrar data ou nome..." onkeyup="filtrarAtas()" style="margin-top:10px">
        <div id="lista-atas" style="margin-top:20px;"></div>
        <iframe id="ata-viewer" class="drive-viewer" src=""></iframe>
        <button id="btn-fechar-viewer" class="btn-save" style="display:none; margin-top:10px; background:var(--accent-red); box-shadow: 0 5px 0 #991b1b;" onclick="fecharViewer()">Fechar Visualização</button>
        <button class="fab-add" onclick="openModal('modalAddAta')"><i class="fas fa-plus"></i></button>
    </div>

    <div id="modalAddAta" class="modal-overlay">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0">Nova Ata (Link Drive)</h3>
                <i class="fas fa-times" style="cursor:pointer" onclick="closeModal('modalAddAta')"></i>
            </div>
            <input type="text" id="newAtaName" placeholder="Nome da Ata">
            <input type="text" id="newAtaDate" placeholder="Data (Ex: 25/04/2026)">
            <input type="text" id="newAtaLink" placeholder="Link do Google Drive">
            <button class="btn-save" onclick="salvarNovaAta()">Cadastrar Ata</button>
        </div>
    </div>

    <div id="modalAddEmployee" class="modal-overlay">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0">Novo Funcionário</h3>
                <i class="fas fa-times" style="cursor:pointer" onclick="closeModal('modalAddEmployee')"></i>
            </div>
            <input type="text" id="newEmpName" placeholder="Nome Completo">
            <input type="text" id="newEmpRole" placeholder="Função">
            <input type="text" id="newEmpTime" placeholder="Horário (Ex: 08:00 às 17:00)">
            <button class="btn-save" onclick="cadastrarFuncionario()">Salvar na Lista</button>
        </div>
    </div>

    <div id="modalPatrimonio" class="modal-overlay">
        <div class="modal-content">
            <div style="display:flex; gap:15px; border-bottom: 1px solid #334155; margin-bottom: 20px; padding-bottom: 10px;">
                <button id="tabNovo" onclick="switchPatriTab('novo')" style="background:none; border:none; color:white; font-weight:700; cursor:pointer;">Novo Item</button>
                <button id="tabLista" onclick="switchPatriTab('lista')" style="background:none; border:none; color:var(--text-dim); font-weight:700; cursor:pointer;">Inventário</button>
                <i class="fas fa-times" style="margin-left:auto; cursor:pointer" onclick="closeModal('modalPatrimonio')"></i>
            </div>
            <div id="patriForm">
                <input type="text" id="patItem" placeholder="Nome do Item">
                <div style="display:flex; gap:10px;">
                    <select id="patEstado" style="flex:2"><option>Excelente</option><option>Bom</option><option>Regular</option><option>Danificado</option></select>
                    <input type="number" id="patQtd" value="1" style="flex:1">
                </div>
                <button class="btn-save" style="background:var(--accent-orange); box-shadow: 0 5px 0 #b45309; margin-top:10px;" onclick="salvarPatrimonio()">Cadastrar no Inventário</button>
            </div>
            <div id="patriLista" style="display:none; max-height: 300px; overflow-y: auto;"><div id="itensCadastrados"></div></div>
        </div>
    </div>

    <input type="file" id="avatar-input" style="display:none" onchange="salvarAvatar(event)">
</div>

<script>
    let bancoDeAtas = JSON.parse(localStorage.getItem('minhasAtas')) || [];

    function changeView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'view-atas') listarAtas();
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // ATAS
    function salvarNovaAta() {
        const nome = document.getElementById('newAtaName').value;
        const data = document.getElementById('newAtaDate').value;
        let link = document.getElementById('newAtaLink').value;
        if(!nome || !link) return;
        if(link.includes('/view')) link = link.replace('/view', '/preview');
        bancoDeAtas.push({ nome, data, link });
        localStorage.setItem('minhasAtas', JSON.stringify(bancoDeAtas));
        closeModal('modalAddAta');
        listarAtas();
    }

    function listarAtas() {
        const container = document.getElementById('lista-atas');
        container.innerHTML = "";
        bancoDeAtas.forEach(ata => {
            const div = document.createElement('div');
            div.className = 'item-card';
            div.style.cursor = 'pointer';
            div.setAttribute('data-info', ata.nome + " " + ata.data);
            div.onclick = () => abrirAta(ata.link);
            div.innerHTML = `<strong>${ata.nome}</strong><br><small>${ata.data}</small>`;
            container.appendChild(div);
        });
    }

    function filtrarAtas() {
        const busca = document.getElementById('ataFilter').value.toLowerCase();
        document.querySelectorAll('#lista-atas .item-card').forEach(item => {
            item.style.display = item.getAttribute('data-info').toLowerCase().includes(busca) ? "block" : "none";
        });
    }

    function abrirAta(link) {
        const viewer = document.getElementById('ata-viewer');
        viewer.src = link;
        viewer.style.display = "block";
        document.getElementById('btn-fechar-viewer').style.display = "block";
        document.getElementById('lista-atas').style.display = "none";
    }

    function fecharViewer() {
        document.getElementById('ata-viewer').style.display = "none";
        document.getElementById('btn-fechar-viewer').style.display = "none";
        document.getElementById('lista-atas').style.display = "block";
    }

    // EQUIPE (COM HORÁRIO RESTAURADO)
    function cadastrarFuncionario() {
        const nome = document.getElementById('newEmpName').value;
        const cargo = document.getElementById('newEmpRole').value;
        const horario = document.getElementById('newEmpTime').value;
        if(!nome) return;
        
        const lista = document.getElementById('employee-list');
        const div = document.createElement('div');
        div.className = 'item-card';
        div.setAttribute('data-nome', nome);
        div.innerHTML = `
            <div style="margin-bottom:10px">
                <strong style="font-size:1.1rem">${nome}</strong><br>
                <small style="color:var(--text-dim)">${cargo} | ${horario}</small>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn-action" style="background:#3b82f633; color:#60a5fa" onclick="alert('Alinhamento registrado para ${nome}')">Alinhamento</button>
                <button class="btn-action" style="background:#ef444433; color:#f87171" onclick="alert('Advertência registrada para ${nome}')">Advertência</button>
            </div>
        `;
        lista.prepend(div);
        
        document.getElementById('newEmpName').value = "";
        document.getElementById('newEmpRole').value = "";
        document.getElementById('newEmpTime').value = "";
        closeModal('modalAddEmployee');
    }

    function executarFiltro() {
        let busca = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('#employee-list .item-card').forEach(card => {
            card.style.display = card.getAttribute('data-nome').toLowerCase().includes(busca) ? "block" : "none";
        });
    }

    // PATRIMÔNIO
    function openPatrimonio() { openModal('modalPatrimonio'); switchPatriTab('novo'); }
    function switchPatriTab(tab) {
        document.getElementById('patriForm').style.display = tab === 'novo' ? 'block' : 'none';
        document.getElementById('patriLista').style.display = tab === 'lista' ? 'block' : 'none';
        document.getElementById('tabNovo').style.color = tab === 'novo' ? 'white' : 'var(--text-dim)';
        document.getElementById('tabLista').style.color = tab === 'lista' ? 'white' : 'var(--text-dim)';
    }

    function salvarPatrimonio() {
        const item = document.getElementById('patItem').value;
        const qtd = document.getElementById('patQtd').value;
        if(!item) return;
        const div = document.createElement('div');
        div.className = 'item-card';
        div.innerHTML = `<strong>${item} (${qtd} un)</strong><br><small>Estado: ${document.getElementById('patEstado').value}</small>`;
        document.getElementById('itensCadastrados').prepend(div);
        document.getElementById('patItem').value = "";
        switchPatriTab('lista');
    }

    function processarUpload(event) { alert("Arquivo: " + event.target.files[0].name); }

    // AVATAR E CARGA INICIAL
    window.onload = function() {
        const foto = localStorage.getItem('avatarCoord');
        if (foto) {
            document.getElementById('user-photo').src = foto;
            document.getElementById('user-photo').style.display = 'block';
            document.getElementById('placeholder-icon').style.display = 'none';
        }
        listarAtas();
    };

    function salvarAvatar(event) {
        const reader = new FileReader();
        reader.onload = function() { localStorage.setItem('avatarCoord', reader.result); location.reload(); };
        reader.readAsDataURL(event.target.files[0]);
    }
</script>
</body>
</html>
