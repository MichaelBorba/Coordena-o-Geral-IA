<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Coordenação Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0f172a; --card-bg: #1e293b; --primary-blue: #3b82f6;
            --accent-orange: #f59e0b; --accent-red: #ef4444; --text-main: #f8fafc;
            --text-dim: #94a3b8; --accent-purple: #a855f7; --card-shadow: #020617;
            --accent-green: #22c55e;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; min-height: 95vh; position: relative; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 15px 5px; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; background: #334155; border: 2px solid var(--primary-blue); overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .emp-photo-container { width: 90px; height: 90px; border-radius: 50%; background: #334155; margin: 0 auto 15px; border: 3px solid var(--accent-orange); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; }
        .emp-photo-container img { width: 100%; height: 100%; object-fit: cover; }
        .emp-photo-container i { font-size: 1.5rem; color: var(--text-dim); }
        .module-card { background: linear-gradient(145deg, #243147, #1a2333); padding: 25px 15px; border-radius: 24px; text-align: center; cursor: pointer; transition: all 0.1s ease; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 8px 0 var(--card-shadow), 0 15px 20px rgba(0, 0, 0, 0.4); }
        .module-card:active { transform: translateY(4px); box-shadow: 0 4px 0 var(--card-shadow); }
        .module-card i { font-size: 2.2rem; margin-bottom: 15px; display: block; }
        .module-card span { font-weight: 700; font-size: 0.9rem; text-transform: uppercase; }
        .icon-blue { color: #60a5fa; } .icon-lightblue { color: #93c5fd; } .icon-green { color: #4ade80; } .icon-dp { color: #cbd5e1; } .icon-gold { color: var(--accent-orange); } .icon-purple { color: var(--accent-purple); }
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .grid-modules { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin: 25px 0; }
        .item-card { background: var(--card-bg); padding: 15px; border-radius: 18px; margin-bottom: 12px; border: 1px solid #334155; display: flex; flex-direction: column; gap: 12px; }
        .emp-info-row { display: flex; align-items: center; gap: 12px; width: 100%; }
        .item-card img.thumb-emp { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; background: #0f172a; border: 2px solid #3b82f6; }
        .card-actions-top { margin-left: auto; display: flex; gap: 12px; color: var(--text-dim); }
        .emp-controls-footer { display: flex; gap: 8px; border-top: 1px solid #334155; padding-top: 12px; justify-content: space-between; }
        input, textarea, select { width: 100%; background: var(--bg-dark); border: 1px solid #334155; border-radius: 10px; padding: 12px; color: white; margin-bottom: 10px; box-sizing: border-box; }
        .btn-save { width: 100%; background: var(--primary-blue); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 5px 0 #1d4ed8; }
        .btn-action { flex: 1; border: none; border-radius: 8px; padding: 10px; font-weight: 700; cursor: pointer; font-size: 0.7rem; transition: transform 0.1s; }
        .calendar-container { background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid #334155; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .calendar-day { padding: 10px 0; border-radius: 10px; cursor: pointer; font-size: 0.9rem; position: relative; }
        .calendar-day.has-event { background: var(--accent-orange); color: white; font-weight: bold; }
        .fab-add { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: var(--primary-blue); border-radius: 50%; border: none; color: white; font-size: 24px; box-shadow: 0 6px 0 #1d4ed8; cursor: pointer; z-index: 99; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: flex-end; z-index: 1000; }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 450px; padding: 25px; border-radius: 25px 25px 0 0; max-height: 85vh; overflow-y: auto; }
        .historico-box { background: #0f172a; padding: 10px; border-radius: 10px; font-size: 0.85rem; margin-top: 10px; white-space: pre-wrap; border-left: 3px solid var(--primary-blue); }
        .dp-input-small { padding: 8px !important; font-size: 0.7rem !important; margin-bottom: 5px !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="view-dashboard" class="view active">
        <header>
            <div style="display:flex; align-items:center; gap:12px;">
                <div class="avatar" onclick="document.getElementById('input-foto-coord').click()">
                    <img id="foto-coord-display" style="display:none">
                    <i class="fas fa-user" id="icon-coord-padrao"></i>
                    <input type="file" id="input-foto-coord" accept="image/*" style="display:none" onchange="uploadFotoCoord(this)">
                </div>
                <span style="font-weight: 600;">Coordenação Local</span>
            </div>
            <i class="fas fa-calendar-alt" style="font-size: 1.5rem; color: var(--primary-blue); cursor: pointer;" onclick="changeView('view-calendar')"></i>
        </header>
        
        <main class="grid-modules">
            <div class="module-card" onclick="changeView('view-employees')"><i class="fas fa-users icon-blue"></i><span>Funcionários</span></div>
            <div class="module-card" onclick="changeView('view-atas')"><i class="far fa-file-alt icon-lightblue"></i><span>Atas</span></div>
            <div class="module-card"><i class="fas fa-chart-line icon-green"></i><span>Relatórios</span></div>
            <div class="module-card" onclick="abrirModuloDP()"><i class="far fa-id-badge icon-dp"></i><span>D.P.</span></div>
            <div class="module-card" onclick="openPatrimonio()"><i class="fas fa-boxes icon-gold"></i><span>Patrimônio</span></div>
            <div class="module-card"><i class="fas fa-cloud-upload-alt icon-purple"></i><span>Upload</span></div>
            <div class="module-card" onclick="openAcolhidos()"><i class="fas fa-bed icon-purple"></i><span>Acolhidos</span></div>
            
        </main>
    </div>

    <!-- VIEW EQUIPE -->
    <div id="view-employees" class="view">
        <header>
            <button onclick="changeView('view-dashboard')" style="background:none; border:none; color:white; cursor:pointer"><i class="fas fa-arrow-left"></i></button>
            <span style="font-weight: 600;">Equipe</span>
            <div style="width:20px"></div>
        </header>
        <div id="employee-list" style="margin-top:20px; padding-bottom: 100px;"></div>
        <button class="fab-add" onclick="prepararNovoEmp()"><i class="fas fa-plus"></i></button>
    </div>

    <!-- MODAL CADASTRO -->
    <div id="modalAddEmployee" class="modal-overlay"><div class="modal-content">
        <h3>Dados do Funcionário</h3>
        <div class="emp-photo-container" onclick="document.getElementById('input-foto-emp').click()">
            <img id="preview-foto-emp" style="display:none">
            <i class="fas fa-camera" id="icon-camera-emp"></i>
            <input type="file" id="input-foto-emp" accept="image/*" style="display:none" onchange="previewFotoEmp(this)">
        </div>
        <input type="hidden" id="editEmpId">
        <input type="text" id="newEmpName" placeholder="Nome">
        <input type="text" id="newEmpRole" placeholder="Função">
        <input type="text" id="newEmpTime" placeholder="Horário">
        
        <select id="newEmpEquipe">
            <option value="">Selecione a Equipe</option>
            <option value="Equipe 1 Diurna">Equipe 1 Diurna</option>
            <option value="Equipe 2 Diurna">Equipe 2 Diurna</option>
            <option value="Equipe 1 Noturna">Equipe 1 Noturna</option>
            <option value="Equipe 2 Noturna">Equipe 2 Noturna</option>
        </select>

        <label style="font-size: 0.8rem; color: var(--text-dim); display:block; margin-bottom:5px; text-align:left;">Data de Admissão:</label>
        <input type="date" id="newEmpAdm">

        <button class="btn-save" onclick="salvarFuncionario()">Salvar</button>
        <button onclick="closeModal('modalAddEmployee')" style="background:none; border:none; color:var(--text-dim); width:100%; margin-top:15px; cursor:pointer">Cancelar</button>
    </div></div>

    <!-- MODAL D.P. -->
    <div id="modalDP" class="modal-overlay">
        <div class="modal-content">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin:0">Gestão D.P. / Contratos</h3>
                <i class="fas fa-times" onclick="closeModal('modalDP')" style="cursor:pointer"></i>
            </div>
            <div id="lista-dp-funcionarios" style="display: flex; flex-direction: column; gap: 15px;"></div>
        </div>
    </div>

    <!-- OUTRAS VIEWS E MODAIS -->
    <div id="view-calendar" class="view">
        <header>
            <button onclick="changeView('view-dashboard')" style="background:none; border:none; color:white; cursor:pointer"><i class="fas fa-arrow-left"></i></button>
            <span style="font-weight: 600;">Eventos</span>
            <button onclick="openModal('modalEvento')" style="background:var(--accent-green); border:none; color:white; padding:5px 10px; border-radius:8px; font-weight:bold; cursor:pointer">+ Novo</button>
        </header>
        <div class="calendar-container">
            <div id="mes-atual" style="text-align:center; font-weight:bold; margin-bottom:15px; color:var(--primary-blue)"></div>
            <div class="calendar-grid" id="calendario-dias"></div>
        </div>
        <div id="event-panel" style="margin-top:15px; background:#0f172a; padding:15px; border-radius:15px; display:none;">
            <h4 id="panel-data" style="margin:0 0 10px 0; color:var(--accent-orange)">Eventos</h4>
            <div id="lista-eventos-dia"></div>
        </div>
    </div>

    <div id="view-atas" class="view">
        <header>
            <button onclick="changeView('view-dashboard')" style="background:none; border:none; color:white; cursor:pointer"><i class="fas fa-arrow-left"></i></button>
            <span style="font-weight: 600;">Atas</span>
        </header>
        <div id="lista-atas" style="margin-top:20px;"></div>
        <iframe id="ata-viewer" style="width:100%; height:500px; display:none; border-radius:15px; border:1px solid #334155; margin-top:10px;"></iframe>
        <button id="btn-fechar-viewer" class="btn-save" style="display:none; background:var(--accent-red); margin-top:10px;" onclick="fecharViewer()">Fechar</button>
        <button class="fab-add" onclick="openModal('modalAddAta')"><i class="fas fa-plus"></i></button>
    </div>

    <div id="modalEvento" class="modal-overlay"><div class="modal-content">
        <h3>Agendar Evento</h3>
        <input type="text" id="eventTitulo" placeholder="Título do Evento">
        <input type="date" id="eventData">
        <input type="time" id="eventHora">
        <button class="btn-save" onclick="salvarEvento()">Salvar Evento</button>
        <button onclick="closeModal('modalEvento')" style="background:none; border:none; color:var(--text-dim); width:100%; margin-top:15px; cursor:pointer">Cancelar</button>
    </div></div>

    <div id="modalAddAta" class="modal-overlay"><div class="modal-content">
        <h3>Nova Ata</h3>
        <input type="text" id="newAtaName" placeholder="Título">
        <input type="text" id="newAtaDate" placeholder="Data">
        <input type="text" id="newAtaLink" placeholder="Link Drive">
        <button class="btn-save" onclick="salvarAta()">Salvar</button>
        <button onclick="closeModal('modalAddAta')" style="background:none; border:none; color:var(--text-dim); width:100%; margin-top:15px; cursor:pointer">Cancelar</button>
    </div></div>

    <div id="modalPatrimonio" class="modal-overlay"><div class="modal-content">
        <div style="display:flex; gap:15px; margin-bottom: 20px;">
            <button onclick="switchPatriTab('novo')" style="background:none; border:none; color:white; font-weight:700; cursor:pointer">Lançar</button>
            <button onclick="switchPatriTab('lista')" style="background:none; border:none; color:var(--text-dim); font-weight:700; cursor:pointer">Inventário</button>
            <i class="fas fa-times" style="margin-left:auto; cursor:pointer" onclick="closeModal('modalPatrimonio')"></i>
        </div>
        <div id="patriForm">
            <input type="text" id="patItem" placeholder="Item">
            <input type="number" id="patQtd" value="1">
            <select id="patEstado"><option>Excelente</option><option>Bom</option><option>Regular</option><option>Danificado</option></select>
            <button class="btn-save" style="background:var(--accent-orange)" onclick="salvarPatrimonio()">Salvar</button>
        </div>
        <div id="patriLista" style="display:none; max-height:300px; overflow-y:auto;"><div id="itensCadastrados"></div></div>
    </div></div>

    <div id="modalHistorico" class="modal-overlay"><div class="modal-content">
        <h3 id="histNome">Prontuário</h3>
        <div id="histConteudo"></div>
        <button onclick="closeModal('modalHistorico')" class="btn-save" style="margin-top:20px; background:#334155">Fechar</button>
    </div></div>

    <div id="modalRegistro" class="modal-overlay"><div class="modal-content">
        <h3 id="tituloRegistro">Registro</h3>
        <input type="hidden" id="regEmpId"><input type="hidden" id="regTipo">
        <textarea id="regTexto" rows="4" placeholder="Descreva o motivo..."></textarea>
        <button class="btn-save" onclick="confirmarRegistro()">Salvar Motivo</button>
        <button onclick="closeModal('modalRegistro')" style="background:none; border:none; color:var(--text-dim); width:100%; margin-top:15px; cursor:pointer">Voltar</button>
    </div></div>

</div>

<script>
    const _supabase = supabase.createClient('https://envuzusmubunlrrhhclu.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVudnV6dXNtdWJ1bmxycmhoY2x1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTMzMTcsImV4cCI6MjA5MzEyOTMxN30.pzepBGPOl9reoD4uLN0HUhpWaWfwv9pjLSkVdau7ntY');

    function changeView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'view-employees') listarEquipe();
        if(id === 'view-calendar') initCalendar();
        if(id === 'view-atas') listarAtas();
    }
    
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function uploadFotoCoord(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('foto-coord-display').src = e.target.result;
                document.getElementById('foto-coord-display').style.display = 'block';
                document.getElementById('icon-coord-padrao').style.display = 'none';
                localStorage.setItem('coord_img', e.target.result);
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    let tempFotoBase64 = "";

    function previewFotoEmp(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('preview-foto-emp').src = e.target.result;
                document.getElementById('preview-foto-emp').style.display = 'block';
                document.getElementById('icon-camera-emp').style.display = 'none';
                tempFotoBase64 = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function listarEquipe() {
        const container = document.getElementById('employee-list');
        container.innerHTML = "Buscando...";
        const { data } = await _supabase.from('funcionarios').select('*').order('nome');
        container.innerHTML = "";
        
        data?.forEach(emp => {
            const div = document.createElement('div'); div.className = 'item-card';
            div.innerHTML = `
                <div class="emp-info-row">
                    <img src="${emp.foto || 'https://via.placeholder.com/50'}" class="thumb-emp">
                    <div>
                        <strong style="font-size: 1rem; display:block;">${emp.nome}</strong>
                        <small style="color:var(--text-dim)">${emp.funcao} | ${emp.horario}</small>
                    </div>
                    <div class="card-actions-top">
                        <i class="fas fa-file-medical" style="color:var(--accent-purple); cursor:pointer" onclick="verHistorico('${emp.id}', '${emp.nome}')"></i>
                        <i class="fas fa-edit" style="cursor:pointer" onclick="prepararEdicaoEmp('${emp.id}','${emp.nome}','${emp.funcao}','${emp.horario}','${emp.equipe}', '${emp.foto}', '${emp.data_admissa}')"></i>
                        <i class="fas fa-trash" style="color:var(--accent-red); cursor:pointer" onclick="excluirItem('funcionarios','${emp.id}',listarEquipe)"></i>
                    </div>
                </div>
                <div class="emp-controls-footer">
                    <button class="btn-action" style="background:#3b82f622; color:#60a5fa" onclick="abrirModalRegistro('${emp.id}', 'alinhamentos')">
                        <i class="fas fa-comments"></i> ALINHAMENTO
                    </button>
                    <button class="btn-action" style="background:#ef444422; color:#f87171" onclick="abrirModalRegistro('${emp.id}', 'advertencias')">
                        <i class="fas fa-exclamation-triangle"></i> ADVERTÊNCIA
                    </button>
                </div>`;
            container.appendChild(div);
        });
    }

    async function salvarFuncionario() {
        const id = document.getElementById('editEmpId').value;
        const payload = { 
            nome: document.getElementById('newEmpName').value, 
            funcao: document.getElementById('newEmpRole').value, 
            horario: document.getElementById('newEmpTime').value, 
            equipe: document.getElementById('newEmpEquipe').value,
            data_admissa: document.getElementById('newEmpAdm').value, 
            foto: tempFotoBase64
        };
        
        if(id) {
            await _supabase.from('funcionarios').update(payload).eq('id', id);
        } else {
            await _supabase.from('funcionarios').insert([payload]);
        }
        closeModal('modalAddEmployee'); 
        listarEquipe();
    }

    function prepararNovoEmp() {
        document.getElementById('editEmpId').value = "";
        document.getElementById('newEmpName').value = "";
        document.getElementById('newEmpRole').value = "";
        document.getElementById('newEmpTime').value = "";
        document.getElementById('newEmpEquipe').value = "";
        document.getElementById('newEmpAdm').value = "";
        document.getElementById('preview-foto-emp').style.display = 'none';
        document.getElementById('icon-camera-emp').style.display = 'block';
        tempFotoBase64 = "";
        openModal('modalAddEmployee');
    }

    function prepararEdicaoEmp(id, n, f, h, e, foto, adm) {
        document.getElementById('editEmpId').value = id;
        document.getElementById('newEmpName').value = n;
        document.getElementById('newEmpRole').value = f;
        document.getElementById('newEmpTime').value = h;
        document.getElementById('newEmpEquipe').value = e || "";
        document.getElementById('newEmpAdm').value = adm || "";
        if(foto) {
            document.getElementById('preview-foto-emp').src = foto;
            document.getElementById('preview-foto-emp').style.display = 'block';
            document.getElementById('icon-camera-emp').style.display = 'none';
            tempFotoBase64 = foto;
        } else {
            document.getElementById('preview-foto-emp').style.display = 'none';
            document.getElementById('icon-camera-emp').style.display = 'block';
            tempFotoBase64 = "";
        }
        openModal('modalAddEmployee');
    }

    async function abrirModuloDP() {
        openModal('modalDP');
        const container = document.getElementById('lista-dp-funcionarios');
        container.innerHTML = "Buscando dados...";
        const { data } = await _supabase.from('funcionarios').select('*').order('nome');
        container.innerHTML = "";

        data?.forEach(emp => {
            let tempoCasa = "N/D";
            let statusExp = "Data não informada";
            let dataAdmFormat = emp.data_admissa ? new Date(emp.data_admissa).toLocaleDateString('pt-BR') : "N/D";

            if(emp.data_admissa) {
                const adm = new Date(emp.data_admissa);
                const hoje = new Date();
                const dias = Math.ceil((hoje - adm) / (1000 * 60 * 60 * 24));
                tempoCasa = `${dias} dias`;
                
                if(dias < 45) {
                    statusExp = `Faltam ${45 - dias} dias p/ 1ª fase (45d)`;
                } else if(dias < 90) {
                    statusExp = `Faltam ${90 - dias} dias p/ efetivação (90d)`;
                } else {
                    statusExp = "Experiência concluída";
                }
            }

            const div = document.createElement('div'); div.className = 'item-card';
            div.style.borderLeft = "4px solid var(--primary-blue)";
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div style="flex:1">
                        <strong style="color:var(--primary-blue)">${emp.nome}</strong><br>
                        <small>Admissão: ${dataAdmFormat}</small><br>
                        <small>Tempo: ${tempoCasa} | Exp: ${statusExp}</small>
                    </div>
                    <button onclick="enviarZapDPCompleto('${emp.id}', '${emp.nome.replace(/'/g, "\\'")}', '${tempoCasa}', '${statusExp}')" style="background:#25d366; border:none; color:white; padding:8px 12px; border-radius:8px; font-size:0.8rem; cursor:pointer"><i class="fab fa-whatsapp"></i> Enviar</button>
                </div>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:10px; font-size:0.75rem; background:rgba(255,255,255,0.03); padding:10px; border-radius:10px;">
                    <label><input type="checkbox" id="chk-docs-${emp.id}" ${emp.check_docs?'checked':''} onchange="atualizarCheck('${emp.id}','check_docs',this.checked)"> Documentos</label>
                    <label><input type="checkbox" id="chk-contrato-${emp.id}" ${emp.check_contrato?'checked':''} onchange="atualizarCheck('${emp.id}','check_contrato',this.checked)"> Contrato</label>
                    <label><input type="checkbox" id="chk-aso-${emp.id}" ${emp.check_aso?'checked':''} onchange="atualizarCheck('${emp.id}','check_aso',this.checked)"> ASO</label>
                    <label><input type="checkbox" id="chk-epi-${emp.id}" ${emp.check_epi?'checked':''} onchange="atualizarCheck('${emp.id}','check_epi',this.checked)"> EPI</label>
                    <label><input type="checkbox" id="chk-vt-${emp.id}" ${emp.check_vt?'checked':''} onchange="atualizarCheck('${emp.id}','check_vt',this.checked)"> Cartão VT</label>
                    <label><input type="checkbox" id="chk-cracha-${emp.id}" ${emp.check_cracha?'checked':''} onchange="atualizarCheck('${emp.id}','check_cracha',this.checked)"> Crachá</label>
                </div>

                <div style="margin-top:10px; display:flex; flex-direction:column; gap:5px;">
                    <input type="text" id="tam-uni-${emp.id}" class="dp-input-small" placeholder="Tamanho Uniforme" value="${emp.tamanho_uniforme || ''}" onblur="atualizarValor('${emp.id}','tamanho_uniforme',this.value)">
                    <input type="text" id="link-zap-${emp.id}" class="dp-input-small" placeholder="Link de Envio" value="${emp.ultimo_envio_zap || ''}" onblur="atualizarValor('${emp.id}','ultimo_envio_zap',this.value)">
                    <input type="date" id="data-zap-${emp.id}" class="dp-input-small" value="${emp.data_zap || ''}" onblur="atualizarValor('${emp.id}','data_zap',this.value)">
                </div>
            `;
            container.appendChild(div);
        });
    }

    async function atualizarCheck(id, campo, valor) {
        await _supabase.from('funcionarios').update({ [campo]: valor }).eq('id', id);
    }

    async function atualizarValor(id, campo, valor) {
        await _supabase.from('funcionarios').update({ [campo]: valor }).eq('id', id);
    }

    function enviarZapDPCompleto(id, nome, tempo, status) {
        const check = (elId) => document.getElementById(elId).checked ? '✅' : '❌';
        const val = (elId) => document.getElementById(elId).value || 'Não informado';
        
        const texto = `*GESTÃO D.P. - ${nome}*\n` +
                      `*Tempo de Empresa:* ${tempo}\n` +
                      `*Situação:* ${status}\n\n` +
                      `*CHECKLIST DOCUMENTOS:*\n` +
                      `${check('chk-docs-'+id)} Docs | ${check('chk-contrato-'+id)} Contrato\n` +
                      `${check('chk-aso-'+id)} ASO | ${check('chk-epi-'+id)} EPI\n` +
                      `${check('chk-vt-'+id)} VT | ${check('chk-cracha-'+id)} Crachá\n\n` +
                      `*INFORMAÇÕES ADICIONAIS:*\n` +
                      `👕 *Uniforme:* ${val('tam-uni-'+id)}\n` +
                      `📅 *Data do Envio:* ${val('data-zap-'+id)}\n` +
                      `🔗 *Link:* ${val('link-zap-'+id)}`;

        window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
    }

    let eventosCache = [];
    async function initCalendar() {
        const agora = new Date();
        const nomesMeses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        const mesDiv = document.getElementById('mes-atual');
        if(mesDiv) mesDiv.innerText = `${nomesMeses[agora.getMonth()]} ${agora.getFullYear()}`;
        const { data } = await _supabase.from('eventos').select('*');
        eventosCache = data || [];
        renderizarCalendario(agora.getMonth(), agora.getFullYear());
    }

    function renderizarCalendario(mes, ano) {
        const grid = document.getElementById('calendario-dias'); if(!grid) return;
        grid.innerHTML = "";
        ["D", "S", "T", "Q", "Q", "S", "S"].forEach(d => grid.innerHTML += `<div style="font-size:0.7rem; color:var(--text-dim); padding-bottom:5px;">${d}</div>`);
        const primeiroDia = new Date(ano, mes, 1).getDay();
        const totalDias = new Date(ano, mes + 1, 0).getDate();
        for(let i = 0; i < primeiroDia; i++) grid.innerHTML += `<div></div>`;
        for(let dia = 1; dia <= totalDias; dia++) {
            const dataISO = `${ano}-${String(mes+1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
            const temEvento = eventosCache.some(e => e.data_evento === dataISO);
            grid.innerHTML += `<div class="calendar-day ${temEvento ? 'has-event' : ''}" onclick="verEventosDia('${dataISO}', ${dia})">${dia}</div>`;
        }
    }

    function verEventosDia(dataISO, dia) {
        const lista = document.getElementById('lista-eventos-dia');
        const eventosDia = eventosCache.filter(e => e.data_evento === dataISO);
        document.getElementById('panel-data').innerText = `Dia ${dia}`;
        document.getElementById('event-panel').style.display = 'block';
        lista.innerHTML = eventosDia.length ? "" : "<small>Sem compromissos.</small>";
        eventosDia.forEach(e => {
            lista.innerHTML += `<div style="padding:8px 0; border-bottom:1px solid #334155; display:flex; justify-content:space-between">
                <span><b>${e.titulo}</b><br><small>${e.hora_evento}</small></span>
                <i class="fas fa-trash" style="color:var(--accent-red); cursor:pointer" onclick="excluirItem('eventos','${e.id}',initCalendar)"></i>
            </div>`;
        });
    }

    async function salvarEvento() {
        await _supabase.from('eventos').insert([{ 
            titulo: document.getElementById('eventTitulo').value, 
            data_evento: document.getElementById('eventData').value, 
            hora_evento: document.getElementById('eventHora').value 
        }]);
        closeModal('modalEvento'); initCalendar();
    }

    async function listarAtas() {
        const container = document.getElementById('lista-atas'); if(!container) return;
        container.innerHTML = "";
        const { data } = await _supabase.from('atas').select('*').order('created_at', {ascending: false});
        data?.forEach(ata => {
            const div = document.createElement('div'); div.className = 'item-card';
            div.innerHTML = `<div onclick="abrirAta('${ata.link_drive}')" style="cursor:pointer; flex:1"><strong>${ata.nome}</strong><br><small>${ata.data_ata}</small></div>
            <div style="display:flex; gap:10px;"><i class="fas fa-trash" style="color:var(--accent-red); cursor:pointer" onclick="excluirItem('atas','${ata.id}',listarAtas)"></i></div>`;
            container.appendChild(div);
        });
    }

    async function salvarAta() {
        await _supabase.from('atas').insert([{ 
            nome: document.getElementById('newAtaName').value, 
            data_ata: document.getElementById('newAtaDate').value, 
            link_drive: document.getElementById('newAtaLink').value.replace('/view', '/preview') 
        }]);
        closeModal('modalAddAta'); listarAtas();
    }

    function abrirAta(l) { 
         const v = document.getElementById('ata-viewer'); v.src=l; v.style.display='block'; 
         document.getElementById('btn-fechar-viewer').style.display='block'; 
         document.getElementById('lista-atas').style.display='none'; 
     }
    function fecharViewer() { 
         document.getElementById('ata-viewer').style.display='none'; 
         document.getElementById('btn-fechar-viewer').style.display='none'; 
         document.getElementById('lista-atas').style.display='block'; 
     }

    function openPatrimonio() { openModal('modalPatrimonio'); listarPatri(); }
    async function listarPatri() {
        const container = document.getElementById('itensCadastrados'); if(!container) return;
        container.innerHTML = "";
        const { data } = await _supabase.from('patrimonio').select('*').order('item');
        data?.forEach(p => {
            const div = document.createElement('div'); div.className = 'item-card';
            div.innerHTML = `<div style="flex:1"><strong>${p.item} (${p.quantidade})</strong><br><small>${p.estado}</small></div>
            <i class="fas fa-trash" style="color:var(--accent-red); cursor:pointer" onclick="excluirItem('patrimonio','${p.id}',listarPatri)"></i>`;
            container.appendChild(div);
        });
    }
    async function salvarPatrimonio() {
        await _supabase.from('patrimonio').insert([{ item: document.getElementById('patItem').value, quantidade: document.getElementById('patQtd').value, estado: document.getElementById('patEstado').value }]);
        listarPatri(); switchPatriTab('lista');
    }
    function switchPatriTab(t) { 
         document.getElementById('patriForm').style.display = t==='novo'?'block':'none'; 
         document.getElementById('patriLista').style.display = t==='lista'?'block':'none'; 
     }

    async function verHistorico(id, nome) {
        document.getElementById('histNome').innerText = "Histórico: " + nome;
        const { data } = await _supabase.from('funcionarios').select('alinhamentos, advertencias').eq('id', id).single();
        document.getElementById('histConteudo').innerHTML = `
            <small style="color:var(--primary-blue)"><b>ALINHAMENTOS:</b></small>
            <div class="historico-box">${data.alinhamentos || 'Sem registros.'}</div>
            <br><small style="color:var(--accent-red)"><b>ADVERTÊNCIAS:</b></small>
            <div class="historico-box" style="border-left-color:var(--accent-red)">${data.advertencias || 'Sem registros.'}</div>`;
        openModal('modalHistorico');
    }

    function abrirModalRegistro(id, tipo) {
        document.getElementById('regEmpId').value = id;
        document.getElementById('regTipo').value = tipo;
        document.getElementById('regTexto').value = "";
        document.getElementById('tituloRegistro').innerText = tipo === 'alinhamentos' ? "Novo Alinhamento" : "Nova Advertência";
        openModal('modalRegistro');
    }

    async function confirmarRegistro() {
        const id = document.getElementById('regEmpId').value;
        const tipo = document.getElementById('regTipo').value;
        const textoNovo = document.getElementById('regTexto').value;
        if(!textoNovo) return alert("Digite o motivo.");
        const { data } = await _supabase.from('funcionarios').select(tipo).eq('id', id).single();
        const novoHist = (data[tipo] || "") + `\n[${new Date().toLocaleDateString('pt-BR')}]: ${textoNovo}`;
        await _supabase.from('funcionarios').update({ [tipo]: novoHist }).eq('id', id);
        closeModal('modalRegistro'); listarEquipe();
    }

    async function excluirItem(tab, id, cb) { 
         if(confirm("Excluir definitivamente?")) { 
             await _supabase.from(tab).delete().eq('id', id); 
             if(cb) cb(); 
             if(tab === 'eventos') document.getElementById('event-panel').style.display = 'none';
        } 
     }

    window.onload = () => {
        const salva = localStorage.getItem('coord_img');
        if(salva) {
            const display = document.getElementById('foto-coord-display');
            const icon = document.getElementById('icon-coord-padrao');
            if(display && icon) {
                display.src = salva;
                display.style.display = 'block';
                icon.style.display = 'none';
            }
        }
    };
</script>
