<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Coordenação Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary-blue: #3b82f6;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-purple: #a855f7;
            --card-shadow: #020617;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; min-height: 95vh; position: relative; }

        .module-card {
            background: linear-gradient(145deg, #243147, #1a2333);
            padding: 25px 15px;
            border-radius: 24px;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: all 0.1s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 0 var(--card-shadow), 0 15px 20px rgba(0, 0, 0, 0.4);
        }

        .module-card:active { transform: translateY(4px); box-shadow: 0 4px 0 var(--card-shadow), 0 5px 10px rgba(0, 0, 0, 0.4); }
        .module-card i { font-size: 2.2rem; margin-bottom: 15px; display: block; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
        .module-card span { font-weight: 700; font-size: 0.9rem; text-transform: uppercase; opacity: 0.9; }

        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { display: flex; align-items: center; justify-content: space-between; padding: 15px 5px; }
        .profile-section { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; background: #334155; border: 2px solid var(--primary-blue); overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .grid-modules { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin: 25px 0; }

        .item-card { background: var(--card-bg); padding: 15px; border-radius: 18px; margin-bottom: 12px; border: 1px solid #334155; box-shadow: 0 4px 6px rgba(0,0,0,0.2); position: relative; }
        .btn-action { flex: 1; border: none; border-radius: 10px; padding: 10px; font-weight: 700; cursor: pointer; transition: all 0.1s; font-size: 0.8rem; background: rgba(255,255,255,0.05); color: white; }
        .btn-action:active { transform: scale(0.95); }

        input, textarea, select { width: 100%; background: var(--bg-dark); border: 1px solid #334155; border-radius: 10px; padding: 12px; color: white; outline: none; box-sizing: border-box; margin-bottom: 10px; }
        
        .btn-save { width: 100%; background: var(--primary-blue); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 5px 0 #1d4ed8; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: flex-end; z-index: 1000; }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 450px; padding: 25px; border-radius: 25px 25px 0 0; }

        .fab-add { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: var(--primary-blue); border-radius: 50%; border: none; color: white; font-size: 24px; box-shadow: 0 6px 0 #1d4ed8; z-index: 99; }

        .card-actions { position: absolute; right: 15px; top: 15px; display: flex; gap: 12px; }
        .card-actions i { cursor: pointer; opacity: 0.7; font-size: 1rem; color: #93c5fd; }

        .historico-mini { font-size: 0.7rem; color: var(--text-dim); margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="view-dashboard" class="view active">
        <header>
            <div class="profile-section">
                <div class="avatar" onclick="document.getElementById('avatar-input').click()">
                    <i class="fas fa-user" id="placeholder-icon"></i>
                    <img src="" id="user-photo" style="display:none; width:100%; height:100%; object-fit:cover;">
                </div>
                <span style="font-weight: 600;">Coordenação Local</span>
            </div>
        </header>
        <main class="grid-modules">
            <div class="module-card" onclick="changeView('view-employees')"><i class="fas fa-users" style="color:#60a5fa"></i><span>Funcionários</span></div>
            <div class="module-card" onclick="changeView('view-atas')"><i class="far fa-file-alt" style="color:#93c5fd"></i><span>Atas</span></div>
            <div class="module-card" onclick="alert('Funcionalidade em breve')"><i class="fas fa-chart-line" style="color:#4ade80"></i><span>Relatórios</span></div>
            <div class="module-card" onclick="alert('Funcionalidade em breve')"><i class="far fa-id-badge" style="color:#cbd5e1"></i><span>D.P.</span></div>
            <div class="module-card" onclick="openPatrimonio()"><i class="fas fa-boxes" style="color:var(--accent-orange)"></i><span>Patrimônio</span></div>
            <div class="module-card" onclick="document.getElementById('file-upload').click()"><i class="fas fa-cloud-upload-alt" style="color:#a855f7"></i><span>Upload</span><input type="file" id="file-upload" style="display:none"></div>
        </main>
    </div>

    <div id="view-employees" class="view">
        <header><button onclick="changeView('view-dashboard')" style="background:none; border:none; color:white;"><i class="fas fa-arrow-left"></i></button><span style="font-weight: 600;">Gestão de Equipe</span><div style="width:20px"></div></header>
        <div id="employee-list" style="margin-top:20px;"></div>
        <button class="fab-add" onclick="prepararNovoFuncionario()"><i class="fas fa-plus"></i></button>
    </div>

    <div id="view-atas" class="view">
        <header><button onclick="changeView('view-dashboard')" style="background:none; border:none; color:white;"><i class="fas fa-arrow-left"></i></button><span style="font-weight: 600;">Arquivo de Atas</span><div style="width:20px"></div></header>
        <div id="lista-atas" style="margin-top:20px;"></div>
        <button class="fab-add" onclick="prepararNovaAta()"><i class="fas fa-plus"></i></button>
    </div>

    <div id="modalAddAta" class="modal-overlay"><div class="modal-content"><h3>Ata</h3><input type="hidden" id="editAtaIndex"><input type="text" id="newAtaName" placeholder="Nome"><input type="text" id="newAtaDate" placeholder="Data"><input type="text" id="newAtaLink" placeholder="Link Drive"><button class="btn-save" onclick="salvarAta()">Salvar</button></div></div>
    <div id="modalAddEmployee" class="modal-overlay"><div class="modal-content"><h3>Funcionário</h3><input type="hidden" id="editEmpIndex"><input type="text" id="newEmpName" placeholder="Nome"><input type="text" id="newEmpRole" placeholder="Função"><input type="text" id="newEmpTime" placeholder="Horário"><button class="btn-save" onclick="salvarFuncionario()">Salvar</button></div></div>
    <div id="modalPatrimonio" class="modal-overlay"><div class="modal-content"><div style="display:flex; gap:15px; margin-bottom:20px;"><button onclick="switchPatriTab('novo')" style="color:white; background:none; border:none;">Gerenciar</button><button onclick="switchPatriTab('lista')" style="color:var(--text-dim); background:none; border:none;">Inventário</button></div><div id="patriForm"><input type="hidden" id="editPatIndex"><input type="text" id="patItem" placeholder="Item"><select id="patEstado"><option>Excelente</option><option>Bom</option><option>Regular</option></select><input type="number" id="patQtd" value="1"><button class="btn-save" onclick="salvarPatrimonio()">Salvar</button></div><div id="patriLista" style="display:none; max-height: 300px; overflow-y: auto;"><div id="itensCadastrados"></div></div></div></div>
    <input type="file" id="avatar-input" style="display:none" onchange="salvarAvatar(event)">
</div>
<script>
    let bancoAtas = JSON.parse(localStorage.getItem('bAtas')) || [];
    let bancoEquipe = JSON.parse(localStorage.getItem('bEquipe')) || [];
    let bancoPatri = JSON.parse(localStorage.getItem('bPatri')) || [];

    function changeView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'view-atas') listarAtas();
        if(id === 'view-employees') listarEquipe();
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // --- FUNÇÕES DE EQUIPE (COM DESCRIÇÃO E HISTÓRICO) ---
    function salvarFuncionario() {
        const i = document.getElementById('editEmpIndex').value;
        const n = { 
            nome: document.getElementById('newEmpName').value, 
            cargo: document.getElementById('newEmpRole').value, 
            horario: document.getElementById('newEmpTime').value,
            historico: i !== "" ? bancoEquipe[i].historico : [] // Mantém o histórico se estiver editando
        };
        if(i === "") bancoEquipe.push(n); else bancoEquipe[i] = n;
        localStorage.setItem('bEquipe', JSON.stringify(bancoEquipe)); 
        closeModal('modalAddEmployee'); listarEquipe();
    }

    function registrarOcorrencia(index, tipo) {
        const motivo = prompt(`Digite a descrição para o(a) ${tipo}:`);
        if (motivo !== null && motivo.trim() !== "") {
            const data = new Date().toLocaleDateString('pt-BR');
            const registro = `${data} - ${tipo}: ${motivo}`;
            
            if(!bancoEquipe[index].historico) bancoEquipe[index].historico = [];
            bancoEquipe[index].historico.unshift(registro); // Adiciona no topo
            
            localStorage.setItem('bEquipe', JSON.stringify(bancoEquipe));
            alert("Registro salvo com sucesso!");
            listarEquipe();
        }
    }

    function listarEquipe() {
        const c = document.getElementById('employee-list'); c.innerHTML = "";
        bancoEquipe.forEach((e, i) => {
            const histHTML = e.historico && e.historico.length > 0 
                ? `<div class="historico-mini"><strong>Última:</strong> ${e.historico[0]}</div>` 
                : "";

            const d = document.createElement('div'); d.className = 'item-card';
            d.innerHTML = `
                <strong>${e.nome}</strong><br><small>${e.cargo} | ${e.horario}</small>
                <div class="card-actions"><i class="fas fa-edit" onclick="editarEmp(${i})"></i><i class="fas fa-trash-alt" style="color:var(--accent-red)" onclick="excluirEmp(${i})"></i></div>
                ${histHTML}
                <div style="display:flex; gap:10px; margin-top:12px;">
                    <button class="btn-action" style="border: 1px solid #3b82f6" onclick="registrarOcorrencia(${i}, 'Alinhamento')">Alinhamento</button>
                    <button class="btn-action" style="border: 1px solid #ef4444" onclick="registrarOcorrencia(${i}, 'Advertência')">Advertência</button>
                </div>`;
            c.appendChild(d);
        });
    }

    function editarEmp(i) { const e = bancoEquipe[i]; document.getElementById('editEmpIndex').value = i; document.getElementById('newEmpName').value = e.nome; document.getElementById('newEmpRole').value = e.cargo; document.getElementById('newEmpTime').value = e.horario; openModal('modalAddEmployee'); }
    function excluirEmp(i) { if(confirm("Remover?")) { bancoEquipe.splice(i,1); localStorage.setItem('bEquipe', JSON.stringify(bancoEquipe)); listarEquipe(); } }
    function prepararNovoFuncionario() { document.getElementById('editEmpIndex').value = ""; document.getElementById('newEmpName').value = ""; document.getElementById('newEmpRole').value = ""; document.getElementById('newEmpTime').value = ""; openModal('modalAddEmployee'); }

    // --- FUNÇÕES DE ATAS E PATRIMÔNIO (SIMPLIFICADAS) ---
    function salvarAta() {
        const i = document.getElementById('editAtaIndex').value;
        const n = { nome: document.getElementById('newAtaName').value, data: document.getElementById('newAtaDate').value, link: document.getElementById('newAtaLink').value.replace('/view', '/preview') };
        if(i === "") bancoAtas.push(n); else bancoAtas[i] = n;
        localStorage.setItem('bAtas', JSON.stringify(bancoAtas)); closeModal('modalAddAta'); listarAtas();
    }
    function listarAtas() {
        const c = document.getElementById('lista-atas'); c.innerHTML = "";
        bancoAtas.forEach((a, i) => {
            const d = document.createElement('div'); d.className = 'item-card';
            d.innerHTML = `<div><strong>${a.nome}</strong><br><small>${a.data}</small></div>
                <div class="card-actions"><i class="fas fa-edit" onclick="editarAta(${i})"></i><i class="fas fa-trash-alt" style="color:var(--accent-red)" onclick="excluirAta(${i})"></i></div>`;
            c.appendChild(d);
        });
    }
    function editarAta(i) { const a = bancoAtas[i]; document.getElementById('editAtaIndex').value = i; document.getElementById('newAtaName').value = a.nome; document.getElementById('newAtaDate').value = a.data; document.getElementById('newAtaLink').value = a.link; openModal('modalAddAta'); }
    function excluirAta(i) { if(confirm("Excluir?")) { bancoAtas.splice(i,1); localStorage.setItem('bAtas', JSON.stringify(bancoAtas)); listarAtas(); } }
    function prepararNovaAta() { document.getElementById('editAtaIndex').value = ""; document.getElementById('newAtaName').value = ""; document.getElementById('newAtaDate').value = ""; document.getElementById('newAtaLink').value = ""; openModal('modalAddAta'); }

    function openPatrimonio() { document.getElementById('editPatIndex').value = ""; document.getElementById('patItem').value = ""; openModal('modalPatrimonio'); switchPatriTab('novo'); listarPatri(); }
    function salvarPatrimonio() {
        const i = document.getElementById('editPatIndex').value;
        const n = { item: document.getElementById('patItem').value, qtd: document.getElementById('patQtd').value, estado: document.getElementById('patEstado').value };
        if(i === "") bancoPatri.push(n); else bancoPatri[i] = n;
        localStorage.setItem('bPatri', JSON.stringify(bancoPatri)); listarPatri(); switchPatriTab('lista');
    }
    function listarPatri() {
        const c = document.getElementById('itensCadastrados'); c.innerHTML = "";
        bancoPatri.forEach((p, i) => {
            const d = document.createElement('div'); d.className = 'item-card';
            d.innerHTML = `<strong>${p.item} (${p.qtd} un)</strong><br><small>${p.estado}</small>
                <div class="card-actions"><i class="fas fa-edit" onclick="editarPatri(${i})"></i><i class="fas fa-trash-alt" style="color:var(--accent-red)" onclick="excluirPatri(${i})"></i></div>`;
            c.appendChild(d);
        });
    }
    function editarPatri(i) { const p = bancoPatri[i]; document.getElementById('editPatIndex').value = i; document.getElementById('patItem').value = p.item; document.getElementById('patQtd').value = p.qtd; document.getElementById('patEstado').value = p.estado; switchPatriTab('novo'); }
    function excluirPatri(i) { if(confirm("Excluir?")) { bancoPatri.splice(i,1); localStorage.setItem('bPatri', JSON.stringify(bancoPatri)); listarPatri(); } }
    function switchPatriTab(t) { document.getElementById('patriForm').style.display = t === 'novo' ? 'block' : 'none'; document.getElementById('patriLista').style.display = t === 'lista' ? 'block' : 'none'; }

    window.onload = function() {
        const f = localStorage.getItem('avatarCoord');
        if (f) { document.getElementById('user-photo').src = f; document.getElementById('user-photo').style.display = 'block'; document.getElementById('placeholder-icon').style.display = 'none'; }
        listarAtas(); listarEquipe();
    };
    function salvarAvatar(e) { const r = new FileReader(); r.onload = function() { localStorage.setItem('avatarCoord', r.result); location.reload(); }; r.readAsDataURL(e.target.files[0]); }
</script>
</body>
</html>
